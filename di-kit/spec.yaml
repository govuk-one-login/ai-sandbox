schemaVersion: "1"
kind: sandbox
name: di-kiro
displayName: di-kiro
description: Kiro set up for a One Login user.

sandbox:
  image: "docker/sandbox-templates:kiro-docker"
  entrypoint:
    run:
      - "/bin/sh"
      - "-c"
      - >-
        kiro-cli whoami 2>/dev/null ||
        kiro-cli login --license pro
        --identity-provider https://uk-digital-identity.awsapps.com/start/
        --region eu-west-2
        --use-device-flow;
        exec kiro

environment:
  variables:
    AWS_DOCUMENTATION_PARTITION: "aws"

commands:
  install:
    - command: pip install uv --break-system-packages
    - command: >-
        echo 'kiro-cli settings telemetry.enabled false'
        >> /etc/sandbox-persistent.sh
  startup:
    - command: ["/bin/sh", "-c", "cp -r /home/agent/di-kit/shared/.kiro/. /home/agent/.kiro/"]
      user: "1000"
      description: "Copy shared Kiro config to ~/.kiro"
    - command: ["/bin/sh", "-c", "if [ -d /home/agent/di-kit/personal/.kiro ]; then cp -r /home/agent/di-kit/personal/.kiro/. /home/agent/.kiro/; fi"]
      user: "1000"
      description: "Overlay personal Kiro config on top of shared"

caps:
  network:
    allow:
      - "cognito-identity.us-east-1.amazonaws.com:443"
      - "oidc.eu-west-2.amazonaws.com:443"
      - "uk-digital-identity.awsapps.com:443"
      - "management.us-east-1.kiro.dev:443"
      - "runtime.us-east-1.kiro.dev:443"
      - "**.docs.aws.amazon.com:443"
      - "**.docs.aws.com:443"
      - "pypi.org:443"
      - "files.pythonhosted.org:443"
      - "docs.docker.com:443"
      - "kiro.dev:443"
      - "registry.npmjs.org:443"
