name: Validate kits

on:
  pull_request:
    paths:
      - "**/spec.yaml"
      - "**/.kit_version"
      - "**/files/**"
      - "**/CHANGELOG.md"

jobs:
  detect-kits:
    name: Detect changed kits
    runs-on: ubuntu-latest
    outputs:
      kits: ${{ steps.find.outputs.kits }}
      any-changed: ${{ steps.find.outputs.any-changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin @v7
        with:
          fetch-depth: 0

      - name: Find kit directories with changes
        id: find
        run: |
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          kits="[]"
          for dir in */; do
            [ -f "$dir/spec.yaml" ] || continue
            kit="${dir%/}"
            if echo "$changed_files" | grep -q "^$kit/"; then
              kits=$(echo "$kits" | jq -c --arg k "$kit" '. + [$k]')
            fi
          done

          echo "kits=$kits" >> "$GITHUB_OUTPUT"
          if [ "$kits" = "[]" ]; then
            echo "any-changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "any-changed=true" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate ${{ matrix.kit }}
    runs-on: ubuntu-latest
    needs: detect-kits
    if: needs.detect-kits.outputs.any-changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        kit: ${{ fromJSON(needs.detect-kits.outputs.kits) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin @v7

      - name: Install sbx CLI
        run: |
          curl -fsSL https://get.docker.com | sudo REPO_ONLY=1 sh
          sudo apt-get update
          sudo apt-get install -y docker-sbx

      - name: Validate kit
        run: sbx kit validate ${{ matrix.kit }}
