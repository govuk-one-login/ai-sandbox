name: Publish di-kit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "di-kit/**"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    name: Validate kit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install sbx CLI
        run: |
          curl -fsSL https://get.docker.com | sudo REPO_ONLY=1 sh
          sudo apt-get update
          sudo apt-get install -y docker-sbx

      - name: Validate kit
        run: sbx kit validate di-kit

  publish:
    name: Publish to ghcr.io
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Guard — must be on main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::Publish must be triggered from the main branch, not '${{ github.ref_name }}'."
            exit 1
          fi

      - name: Read version from .kit_version
        id: version
        run: |
          version=$(cat di-kit/.kit_version | tr -d '[:space:]')
          if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid semver in di-kit/.kit_version: '$version'"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=di-kit/v$version" >> "$GITHUB_OUTPUT"

      - name: Guard — version tag must not already exist
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "::error::Tag '${{ steps.version.outputs.tag }}' already exists. Bump the version in di-kit/.kit_version before publishing."
            exit 1
          fi

      - name: Guard — this commit must not already have a di-kit version tag
        run: |
          existing_tags=$(git tag --points-at HEAD | grep '^di-kit/v' || true)
          if [ -n "$existing_tags" ]; then
            echo "::error::HEAD already tagged as: $existing_tags. To re-publish, remove the existing tag first (git tag -d <tag> && git push origin :refs/tags/<tag>)."
            exit 1
          fi

      - name: Install sbx CLI
        run: |
          curl -fsSL https://get.docker.com | sudo REPO_ONLY=1 sh
          sudo apt-get update
          sudo apt-get install -y docker-sbx

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push kit (versioned tag)
        run: sbx kit push di-kit ghcr.io/${{ github.repository }}/di-kit:${{ steps.version.outputs.version }}

      - name: Push kit (latest tag)
        run: sbx kit push di-kit ghcr.io/${{ github.repository }}/di-kit:latest

      - name: Tag commit with version
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
